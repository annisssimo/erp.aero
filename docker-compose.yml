version: '3.9'

services:
  db:
    image: mysql:8
    container_name: erp-aero-mysql
    environment:
      MYSQL_ROOT_PASSWORD: erp_secret
      MYSQL_DATABASE: erp_aero
      MYSQL_USER: erp_user
      MYSQL_PASSWORD: erp_pass
    ports:
      - '3307:3306'
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    healthcheck:
      test: ['CMD', 'mysqladmin', 'ping', '-u', 'erp_user', '-perp_pass', '--silent']
      interval: 5s
      timeout: 5s
      retries: 10
    volumes:
      - mysql_data:/var/lib/mysql

volumes:
  mysql_data:
